<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Winning Content Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#0a0d14;--panel:#141a26;--panel2:#0f131c;--bd:#2a3140;--bd2:#3e4859;
    --gold:#d4933a;--gold2:#e0a82d;--text:#d4dae8;--mut:#7a8aa8;--mut2:#5a6478;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
    letter-spacing:-0.005em;
    background-image:linear-gradient(rgba(62,72,89,0.10) 1px,transparent 1px),linear-gradient(90deg,rgba(62,72,89,0.10) 1px,transparent 1px);
    background-size:32px 32px;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:var(--gold);text-decoration:none;}

  /* ---- gate ---- */
  #gate{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%,rgba(212,147,58,0.07),transparent),var(--bg);}
  .gate-card{background:linear-gradient(180deg,rgba(22,28,40,0.96),rgba(15,19,28,0.98));
    border:1px solid var(--bd);border-radius:8px;padding:40px 36px;max-width:380px;width:90%;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);}
  .gate-badge{font-size:9px;color:var(--gold);letter-spacing:3px;font-weight:700;padding:3px 9px;
    border:1px solid rgba(212,147,58,0.4);border-radius:3px;background:rgba(212,147,58,0.06);display:inline-block;}
  .gate-card h1{font-size:22px;font-weight:800;letter-spacing:-0.4px;color:#e8ecf2;margin:18px 0 6px;}
  .gate-card p{font-size:13px;color:var(--mut);line-height:1.5;margin-bottom:22px;}
  #pass{width:100%;background:#0b0e15;border:1px solid var(--bd2);border-radius:5px;color:var(--text);
    padding:12px 14px;font-size:15px;font-family:'JetBrains Mono',monospace;text-align:center;letter-spacing:2px;outline:none;}
  #pass:focus{border-color:var(--gold);}
  .btn{margin-top:14px;width:100%;background:var(--gold);color:#1a1206;border:none;border-radius:5px;
    padding:12px;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
  .btn:hover{background:var(--gold2);}
  .btn:disabled{opacity:0.55;cursor:default;}
  #gerr{color:#e06a5a;font-size:12px;margin-top:12px;min-height:16px;}

  /* ---- app ---- */
  #app{display:none;}
  .topbar{background:linear-gradient(180deg,rgba(10,13,20,0.99),rgba(17,21,30,0.97));
    border-bottom:1px solid var(--bd2);padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);box-shadow:0 1px 0 rgba(212,160,67,0.12);}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .tag{font-size:9px;color:var(--gold);letter-spacing:3px;font-weight:700;padding:2px 7px;
    border:1px solid rgba(212,147,58,0.4);border-radius:2px;background:rgba(212,147,58,0.06);}
  .brand .title{font-size:15px;font-weight:800;color:#e8ecf2;letter-spacing:1px;}
  .meta{font-size:10px;color:var(--mut2);}
  .tools{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .tools input,.tools select{background:#0b0e15;border:1px solid var(--bd2);border-radius:5px;color:var(--text);
    padding:8px 11px;font-size:12px;font-family:'Inter',sans-serif;outline:none;}
  .tools input{min-width:180px;}
  .tools input:focus,.tools select:focus{border-color:var(--gold);}
  .seg{display:flex;border:1px solid var(--bd2);border-radius:5px;overflow:hidden;}
  .seg button{background:transparent;border:none;color:var(--mut);padding:8px 12px;font-size:11px;font-weight:700;
    cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;}
  .seg button.on{background:rgba(212,147,58,0.14);color:var(--gold);}

  .wrap{max-width:1480px;margin:0 auto;padding:22px 24px 60px;}
  .count{font-size:11px;color:var(--mut);margin-bottom:16px;}
  .count b{color:var(--text);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;}
  .card{background:linear-gradient(180deg,rgba(22,28,40,0.9),rgba(15,19,28,0.95));border:1px solid var(--bd);
    border-radius:7px;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;display:flex;flex-direction:column;}
  .card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 10px 26px rgba(0,0,0,0.45);}
  .thumb{position:relative;width:100%;aspect-ratio:9/16;background:#0b0e15;overflow:hidden;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;
    color:var(--bd2);background:linear-gradient(135deg,#11151e,#0b0e15);}
  .plat{position:absolute;top:8px;left:8px;font-size:9px;font-weight:700;letter-spacing:0.5px;padding:3px 7px;border-radius:3px;
    backdrop-filter:blur(6px);}
  .plat.ig{background:rgba(214,41,118,0.82);color:#fff;}
  .plat.fb{background:rgba(24,119,242,0.85);color:#fff;}
  .views{position:absolute;bottom:8px;left:8px;font-size:11px;font-weight:800;color:#fff;
    background:rgba(0,0,0,0.6);padding:3px 8px;border-radius:4px;backdrop-filter:blur(4px);}
  .views span{color:var(--gold2);}
  .body{padding:11px 12px 12px;display:flex;flex-direction:column;gap:7px;flex:1;}
  .acct{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text);font-weight:600;}
  .acct .vf{color:#3eb5c4;font-size:10px;}
  .acct .fol{color:var(--mut2);font-weight:400;margin-left:auto;}
  .desc{font-size:11.5px;color:var(--mut);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .tags{display:flex;flex-wrap:wrap;gap:4px;}
  .tags span{font-size:9px;color:var(--gold);background:rgba(212,147,58,0.08);border:1px solid rgba(212,147,58,0.18);
    padding:1px 5px;border-radius:3px;}
  .foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid var(--bd);
    font-size:10px;color:var(--mut2);}
  .foot .watch{color:var(--gold);font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;}
  .empty{text-align:center;color:var(--mut2);padding:60px;font-size:13px;}

  /* ---- creator portal: ideas ---- */
  .sechead{display:flex;align-items:center;gap:11px;margin:4px 0 15px;flex-wrap:wrap;}
  .sechead .sh-tag{font-size:9px;color:var(--gold);letter-spacing:3px;font-weight:700;padding:3px 8px;
    border:1px solid rgba(212,147,58,0.4);border-radius:3px;background:rgba(212,147,58,0.06);}
  .sechead .sh-title{font-size:15px;font-weight:800;color:#e8ecf2;letter-spacing:1px;}
  .sechead .sh-sub{font-size:11px;color:var(--mut2);}
  .libhead{margin-top:36px;padding-top:24px;border-top:1px solid var(--bd);}
  .ideas{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;margin-bottom:6px;}
  .idea{display:flex;background:linear-gradient(180deg,rgba(30,25,15,0.55),rgba(15,19,28,0.95));
    border:1px solid var(--bd2);border-left:3px solid var(--gold);border-radius:7px;overflow:hidden;}
  .idea .ithumb{width:80px;flex:0 0 80px;background:#0b0e15;}
  .idea .ithumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .idea .ibody{padding:13px 15px;display:flex;flex-direction:column;gap:7px;flex:1;min-width:0;}
  .idea .ititle{font-size:13.5px;font-weight:700;color:#e8ecf2;line-height:1.3;}
  .idea .itext{font-size:12px;color:var(--mut);line-height:1.5;white-space:pre-wrap;}
  .idea .ifoot{margin-top:auto;display:flex;align-items:center;gap:12px;padding-top:5px;}
  .istat{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.5px;
    border:1px solid var(--bd2);background:transparent;color:var(--mut);padding:4px 9px;border-radius:4px;cursor:pointer;}
  .istat.wip{color:var(--gold);border-color:rgba(212,147,58,0.5);background:rgba(212,147,58,0.1);}
  .istat.done{color:#5cc98a;border-color:rgba(92,201,138,0.45);background:rgba(92,201,138,0.1);}
  .iwatch{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.5px;}

  /* ---- topbar buttons (creator toggle + admin publish) ---- */
  .tbtn{background:var(--gold);color:#1a1206;border:none;border-radius:5px;padding:8px 13px;font-size:11px;font-weight:700;
    letter-spacing:0.5px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
  .tbtn:hover{background:var(--gold2);} .tbtn:disabled{opacity:0.5;cursor:default;}

  /* ---- admin: assign a library video to a creator ---- */
  .assignbar{display:flex;gap:6px;align-items:center;position:relative;margin-top:7px;flex-wrap:wrap;}
  .abtn{flex:1;min-width:0;background:rgba(212,147,58,0.13);color:var(--gold);border:1px solid rgba(212,147,58,0.45);
    border-radius:5px;padding:7px 9px;font-size:10px;font-weight:700;letter-spacing:0.5px;cursor:pointer;font-family:'JetBrains Mono',monospace;}
  .abtn:hover{background:rgba(212,147,58,0.24);}
  .awatch{background:transparent;border:1px solid var(--bd2);color:var(--mut);border-radius:5px;padding:7px 10px;font-size:11px;
    font-weight:700;cursor:pointer;}
  .awatch:hover{border-color:var(--gold);color:var(--gold);}
  .amenu{position:absolute;bottom:calc(100% + 5px);left:0;right:0;background:#11151e;border:1px solid var(--bd2);border-radius:6px;
    max-height:210px;overflow:auto;z-index:40;box-shadow:0 12px 34px rgba(0,0,0,0.55);}
  .amenu .ac{padding:8px 11px;font-size:11.5px;color:var(--text);cursor:pointer;border-bottom:1px solid var(--bd);}
  .amenu .ac:last-child{border-bottom:none;}
  .amenu .ac:hover{background:rgba(212,147,58,0.13);color:var(--gold);}
  .amenu .ac.new{color:var(--gold);font-weight:700;}
  .assigned{width:100%;color:#5cc98a;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:0.3px;}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#141a26;border:1px solid var(--bd2);
    color:var(--text);padding:11px 20px;border-radius:6px;font-size:12.5px;display:none;z-index:300;box-shadow:0 10px 30px rgba(0,0,0,0.5);}

  @media(max-width:560px){.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px;}
    .tools input{min-width:120px;}
    .ideas{grid-template-columns:1fr;}}
</style></head><body>

<div id="gate">
  <div class="gate-card">
    <div class="gate-badge">SWIPE FILE</div>
    <h1>Winning Content Library</h1>
    <p>Enter the creator passcode to browse the swipe file.</p>
    <input id="pass" type="password" placeholder="passcode" autocomplete="off" autofocus>
    <button class="btn" id="go">UNLOCK</button>
    <div id="gerr"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="brand">
      <span class="tag">SWIPE FILE</span>
      <span class="title">WINNING CONTENT LIBRARY</span>
      <span class="meta mono" id="upd"></span>
    </div>
    <div class="tools">
      <div class="seg" id="viewseg" style="display:none;">
        <button data-v="lib" class="on">LIBRARY</button>
        <button data-v="mine">MY VIDEOS</button>
      </div>
      <input id="q" placeholder="search caption, #tag, account…">
      <div class="seg" id="platseg">
        <button data-p="all" class="on">ALL</button>
        <button data-p="instagram">IG</button>
        <button data-p="facebook">FB</button>
      </div>
      <div class="seg" id="dateseg">
        <button data-d="all" class="on">ALL TIME</button>
        <button data-d="7">7D</button>
        <button data-d="30">30D</button>
        <button data-d="90">90D</button>
      </div>
      <select id="sort">
        <option value="views">Most views</option>
        <option value="recent">Most recent</option>
        <option value="likes">Most likes</option>
        <option value="comments">Most comments</option>
      </select>
      <button class="tbtn" id="pubBtn" style="display:none;">PUBLISH ↗</button>
    </div>
  </div>
  <div class="wrap">
    <div id="ideasPanel" style="display:none;">
      <div class="sechead">
        <span class="sh-tag">FOR YOU</span>
        <span class="sh-title">YOUR VIDEO IDEAS</span>
        <span class="sh-sub" id="ideasSub"></span>
      </div>
      <div class="ideas" id="ideasGrid"></div>
    </div>
    <div id="libHead" class="sechead libhead" style="display:none;">
      <span class="sh-tag">SWIPE FILE</span>
      <span class="sh-title">WINNING CONTENT LIBRARY</span>
      <span class="sh-sub">proven videos to model</span>
    </div>
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">No videos match your filters.</div>
  </div>
</div>

<div id="toast"></div>

<script src="data.js"></script>
<script>
const $=id=>document.getElementById(id);
let VIDEOS=[], IDEAS=[], CREATOR=null, TOKEN='', CREATORS=[];
// Admin mode: only when this exact page is served from the bot on Jayden's Mac
// (localhost). The public GitHub Pages copy is never admin — its assign API isn't reachable.
const ADMIN=['localhost','127.0.0.1'].includes(location.hostname);
// Cloudflare Worker base for status sync-back. Empty string => localStorage-only.
let STATUS_API=(window.SWIPE_STATUS_API||'').replace(/\/+$/,'');

function fmt(n){n=+n||0;if(n>=1e6)return (n/1e6).toFixed(n>=1e7?0:1)+'M';if(n>=1e3)return (n/1e3).toFixed(n>=1e4?0:1)+'K';return ''+n;}
function ago(ts){if(!ts)return '';const d=Date.now()/1000-ts;const day=86400;
  if(d<day)return 'today';if(d<2*day)return '1d ago';if(d<30*day)return Math.floor(d/day)+'d ago';
  if(d<365*day)return Math.floor(d/(30*day))+'mo ago';return Math.floor(d/(365*day))+'y ago';}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ---- shared little helpers (toast + same-origin API) ----
function toast(m){const t=$('toast');if(!t)return;t.textContent=m;t.style.display='block';
  clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',2600);}
async function api(path,opts){
  const r=await fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},opts||{}));
  let j={};try{j=await r.json();}catch(e){}
  if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
  return j;
}

// ---- creator view toggle: LIBRARY (what everyone sees) <-> MY VIDEOS (their picks) ----
function setView(v){
  const mine=(v==='mine');
  $('ideasPanel').style.display = mine?'block':'none';
  $('libHead').style.display    = mine?'none':(CREATOR?'flex':'none');
  $('count').style.display      = mine?'none':'block';
  $('grid').style.display       = mine?'none':'grid';
  $('empty').style.display      = 'none';
  document.querySelectorAll('#viewseg button').forEach(x=>x.classList.toggle('on',x.dataset.v===v));
  if(!mine) render();   // refresh the library grid (keeps current filters)
}

// ---- admin: drop a library video into a creator's personalized section ----
function closeMenus(except){document.querySelectorAll('.amenu').forEach(m=>{if(m!==except)m.style.display='none';});}
function buildMenu(vid){
  const m=document.createElement('div'); m.className='amenu';
  const active=CREATORS.filter(c=>!c.revoked);
  let h=`<div class="ac new" data-vid="${esc(vid)}" data-new="1">+ New creator…</div>`;
  if(!active.length) h+=`<div class="ac" style="cursor:default;color:var(--mut2)">No creators yet — use “New creator…”</div>`;
  for(const c of active)
    h+=`<div class="ac" data-vid="${esc(vid)}" data-token="${esc(c.token)}" data-name="${esc(c.name)}">${esc(c.name)}${c.handle?' · @'+esc(c.handle):''}</div>`;
  m.innerHTML=h; return m;
}
async function onPick(ac){
  const vid=ac.dataset.vid; let token=ac.dataset.token, name=ac.dataset.name;
  if(ac.dataset.new){
    const nm=(prompt('New creator name:')||'').trim(); if(!nm){closeMenus();return;}
    try{const r=await api('/swipe/creators',{method:'POST',body:JSON.stringify({name:nm})});
      CREATORS.push(r); token=r.token; name=r.name;}
    catch(e){toast('Error: '+e.message); return;}
  }
  closeMenus();
  if(token) await assignTo(vid,token,name);
}
async function assignTo(vid,token,name){
  const v=VIDEOS.find(x=>x.id===vid)||{};
  const title=((v.desc||'').slice(0,70).trim())||('Winning video — @'+(v.handle||''));
  try{
    await api('/swipe/creators/'+token+'/ideas',{method:'POST',
      body:JSON.stringify({title,body:'',ref_type:'video',ref_id:vid})});
    toast('Added to '+name+' — hit PUBLISH to push it live');
    const btn=[...document.querySelectorAll('.card .abtn')].find(b=>b.dataset.vid===vid);
    if(btn){const bar=btn.parentElement; let chip=bar.querySelector('.assigned');
      if(!chip){chip=document.createElement('span');chip.className='assigned';bar.appendChild(chip);}
      chip.textContent='✓ assigned to '+name;}
  }catch(e){toast('Error: '+e.message);}
}
async function doPublish(){
  const b=$('pubBtn'); b.disabled=true; const o=b.textContent; b.textContent='PUBLISHING…';
  try{const r=await api('/swipe/publish',{method:'POST',body:'{}'});
    toast(r.status==='ok'?'Published ✓ creators see updates in ~1 min':'Publish finished with errors');}
  catch(e){toast('Publish failed: '+e.message);}
  b.disabled=false; b.textContent=o;
}
async function bootAdmin(){
  try{
    document.querySelector('.brand .tag').textContent='ADMIN';
    document.querySelector('.brand .title').textContent='ASSIGN TO CREATORS';
    const lib=await api('/swipe/library'); VIDEOS=lib.videos||[];
    try{CREATORS=await api('/swipe/creators');}catch(e){CREATORS=[];}
    const nC=CREATORS.filter(c=>!c.revoked).length;
    $('upd').textContent=VIDEOS.length+' videos · '+nC+' creator'+(nC===1?'':'s');
    $('gate').style.display='none'; $('app').style.display='block'; $('pubBtn').style.display='inline-block';
    render();
  }catch(e){
    $('gerr').textContent='Admin load failed: '+e.message+' — is the bot running on this Mac?';
  }
}

async function decryptBlob(b64, iters, passcode){
  const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(passcode),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt,iterations:iters,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
async function decrypt(passcode){
  return decryptBlob(window.SWIPE_ENC, window.SWIPE_META.iters, passcode);
}
async function sha256hex(s){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function loadScript(src){
  return new Promise((res,rej)=>{const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=()=>rej(new Error('load fail')); document.head.appendChild(s);});
}

// ---- creator portal: tailored video ideas ----
function ideaKey(id){return 'swipe_idea_'+TOKEN+'_'+id;}
function ideaStatus(id){try{return localStorage.getItem(ideaKey(id))||'todo';}catch(e){return 'todo';}}
function setIdeaStatus(id,v){try{localStorage.setItem(ideaKey(id),v);}catch(e){}}
function statLabel(s){return s==='done'?'✓ POSTED':s==='wip'?'● FILMING':'○ TO DO';}

// ---- status sync-back (active only when a Worker URL was baked into data.js) ----
// localStorage stays the on-device cache; the Worker is the shared source of truth
// so Jayden sees taps too. Taps that fail (offline) queue and retry on next load.
function qKey(){return 'swipe_q_'+TOKEN;}
function loadQueue(){try{return JSON.parse(localStorage.getItem(qKey())||'[]');}catch(e){return [];}}
function saveQueue(q){try{localStorage.setItem(qKey(),JSON.stringify(q));}catch(e){}}
function enqueue(id,status){const q=loadQueue().filter(x=>x.id!=id);q.push({id:+id,status:status});saveQueue(q);}
async function postStatus(id,status){
  // text/plain keeps this a CORS "simple" request (no preflight); Worker parses the body
  const r=await fetch(STATUS_API+'/status',{method:'POST',
    headers:{'Content-Type':'text/plain;charset=UTF-8'},
    body:JSON.stringify({c:TOKEN,idea_id:+id,status:status})});
  if(!r.ok) throw new Error('status '+r.status);
  return true;
}
async function pushStatus(id,status){
  if(!STATUS_API) return;                 // localStorage-only mode
  try{await postStatus(id,status);}       // UI already updated optimistically
  catch(e){enqueue(id,status);}           // offline → retry next load
}
async function flushQueue(){
  if(!STATUS_API) return;
  const q=loadQueue(); if(!q.length) return;
  const keep=[];
  for(const it of q){try{await postStatus(it.id,it.status);}catch(e){keep.push(it);}}
  saveQueue(keep);
}
async function pullStatus(){
  if(!STATUS_API) return;
  let r; try{r=await fetch(STATUS_API+'/portal?c='+encodeURIComponent(TOKEN));}catch(e){return;}
  if(!r.ok) return;
  let data; try{data=await r.json();}catch(e){return;}
  const m=data.statuses||{};
  for(const k in m){if(m[k]==='todo'||m[k]==='wip'||m[k]==='done') setIdeaStatus(k,m[k]);}
}
async function syncStatus(){try{await flushQueue();await pullStatus();}catch(e){}}

function renderIdeas(){
  const wrap=$('ideasGrid'); wrap.innerHTML='';
  if(!IDEAS.length){$('ideasPanel').style.display='none';return;}
  $('ideasPanel').style.display='block';
  $('ideasSub').textContent=IDEAS.length+(IDEAS.length===1?' idea':' ideas')+' tailored for you';
  const frag=document.createDocumentFragment();
  for(const it of IDEAS){
    const st=ideaStatus(it.id);
    const card=document.createElement('div'); card.className='idea';
    const thumb=it.thumb?`<div class="ithumb"><img loading="lazy" src="${esc(it.thumb)}"></div>`:'';
    const ref=it.url?`<a class="iwatch" href="${esc(it.url)}" target="_blank" rel="noopener">REFERENCE ↗</a>`:'';
    card.innerHTML=`${thumb}<div class="ibody">
        <div class="ititle">${esc(it.title)}</div>
        ${it.body?`<div class="itext">${esc(it.body)}</div>`:''}
        <div class="ifoot"><button class="istat ${st}" data-id="${esc(''+it.id)}">${statLabel(st)}</button>${ref}</div>
      </div>`;
    frag.appendChild(card);
  }
  wrap.appendChild(frag);
}

function render(){
  const q=$('q').value.trim().toLowerCase();
  const plat=document.querySelector('#platseg button.on').dataset.p;
  const dwin=document.querySelector('#dateseg button.on').dataset.d;
  const sort=$('sort').value;
  const nowS=Date.now()/1000;
  let list=VIDEOS.filter(v=>{
    if(plat!=='all'&&v.platform!==plat)return false;
    if(dwin!=='all'){if(!v.posted)return false;if(nowS-v.posted>(+dwin)*86400)return false;}
    if(q){const hay=(v.desc+' '+v.account+' '+v.handle+' '+(v.tags||[]).join(' ')).toLowerCase();
      if(!hay.includes(q))return false;}
    return true;});
  const keymap={views:'views',likes:'likes',comments:'comments',recent:'posted'};
  const k=keymap[sort];list.sort((a,b)=>(b[k]||0)-(a[k]||0));
  $('count').innerHTML='Showing <b>'+list.length+'</b> of '+VIDEOS.length+' winning videos';
  const g=$('grid');g.innerHTML='';
  $('empty').style.display=list.length?'none':'block';
  const frag=document.createDocumentFragment();
  for(const v of list){
    const c=document.createElement('div');c.className='card';
    if(!ADMIN) c.onclick=()=>{if(v.url)window.open(v.url,'_blank','noopener');};
    const pc=v.platform==='instagram'?'ig':'fb';const pl=v.platform==='instagram'?'INSTAGRAM':'FACEBOOK';
    const thumb=v.thumb?`<img loading="lazy" src="${v.thumb}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph',textContent:'${esc((v.account||'?')[0]).toUpperCase()}'}))">`
      :`<div class="ph">${esc((v.account||'?')[0]).toUpperCase()}</div>`;
    const tags=(v.tags||[]).slice(0,3).map(t=>`<span>#${esc(t.replace(/^#/,''))}</span>`).join('');
    c.innerHTML=`<div class="thumb">${thumb}<span class="plat ${pc}">${pl}</span>
        <span class="views"><span>▶</span> ${fmt(v.views)}</span></div>
      <div class="body">
        <div class="acct">@${esc(v.handle)}${v.verified?'<span class="vf">✓</span>':''}<span class="fol">${v.followers?fmt(v.followers)+' foll':''}</span></div>
        <div class="desc">${esc(v.desc)||'<span style=color:#444>no caption</span>'}</div>
        ${tags?`<div class="tags">${tags}</div>`:''}
        <div class="foot"><span>♥ ${fmt(v.likes)} · 💬 ${fmt(v.comments)} · ${ago(v.posted)}</span><span class="watch">WATCH ↗</span></div>
      </div>`;
    if(ADMIN){
      const bar=document.createElement('div'); bar.className='assignbar';
      bar.innerHTML=`<button class="abtn" data-vid="${esc(v.id)}">+ ASSIGN ▾</button>`+
        `<button class="awatch" data-url="${esc(v.url)}" title="watch">▶</button>`;
      c.querySelector('.body').appendChild(bar);
    }
    frag.appendChild(c);
  }
  g.appendChild(frag);
}

async function unlock(){
  const pass=$('pass').value;if(!pass)return;
  $('go').disabled=true;$('gerr').textContent='';
  try{
    const data=await decrypt(pass);
    VIDEOS=data.videos||[];
    $('upd').textContent='updated '+(window.SWIPE_META.generated_at||'');
    $('gate').style.display='none';$('app').style.display='block';
    try{sessionStorage.setItem('swipe_pass',pass);}catch(e){}
    render();
  }catch(e){
    $('gerr').textContent='Wrong passcode.';$('go').disabled=false;
    $('pass').value='';$('pass').focus();
  }
}

$('go').onclick=unlock;
$('pass').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
['q','sort'].forEach(id=>$(id).addEventListener('input',render));
$('platseg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#platseg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();});
$('dateseg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  document.querySelectorAll('#dateseg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();});
// cycle an idea's status: to do -> filming -> posted (stored locally on this device)
$('ideasGrid').addEventListener('click',e=>{
  const b=e.target.closest('.istat');if(!b)return;
  const id=b.dataset.id;const nxt={todo:'wip',wip:'done',done:'todo'}[ideaStatus(id)];
  setIdeaStatus(id,nxt);b.className='istat '+nxt;b.textContent=statLabel(nxt);
  pushStatus(id,nxt);});
// creator toggle: switch between the shared library and their own picks
$('viewseg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;setView(b.dataset.v);});
// admin only: assign menu on each card + publish
if(ADMIN){
  $('pubBtn').onclick=doPublish;
  $('grid').addEventListener('click',async e=>{
    const w=e.target.closest('.awatch'); if(w){const u=w.dataset.url;if(u)window.open(u,'_blank','noopener');return;}
    const ab=e.target.closest('.abtn');
    if(ab){const bar=ab.parentElement; let m=bar.querySelector('.amenu');
      if(!m){m=buildMenu(ab.dataset.vid); bar.appendChild(m);}
      const wasOpen=m.style.display==='block'; closeMenus(); m.style.display=wasOpen?'none':'block'; return;}
    const ac=e.target.closest('.ac'); if(ac){await onPick(ac); return;}
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.assignbar'))closeMenus();});
}

// personal link (?c=<token>): load + decrypt this creator's file, show their ideas,
// then unlock the shared library with the passcode embedded inside their file.
async function bootCreator(token){
  try{
    const hash=(await sha256hex(token)).slice(0,32);
    await loadScript('creators/'+hash+'.js');
    if(!window.CREATOR_ENC||!window.CREATOR_META) throw new Error('no creator data');
    const cd=await decryptBlob(window.CREATOR_ENC, window.CREATOR_META.iters, token);
    TOKEN=token; CREATOR=cd; IDEAS=cd.ideas||[];
    const nm=(cd.name||'').trim();
    document.querySelector('.brand .tag').textContent='YOUR HUB';
    document.querySelector('.brand .title').textContent=nm?('HEY '+nm.toUpperCase()):'WELCOME';
    $('upd').textContent='updated '+(window.CREATOR_META.generated_at||'');
    const lib=await decryptBlob(window.SWIPE_ENC, window.SWIPE_META.iters, cd.lib_pass);
    VIDEOS=lib.videos||[];
    $('gate').style.display='none'; $('app').style.display='block';
    await syncStatus();   // flush queued taps, then pull the shared truth (no-op if offline/unconfigured)
    renderIdeas(); render();
    if(IDEAS.length){
      $('viewseg').style.display='flex';
      $('viewseg').querySelector('[data-v="mine"]').textContent='MY VIDEOS ('+IDEAS.length+')';
    }
    setView('lib');   // land on the shared library; one tap opens their personalized section
  }catch(e){
    console.error(e);
    document.querySelector('.gate-card h1').textContent='Link not active';
    document.querySelector('.gate-card p').textContent='This personal link is invalid or has been turned off. Ask Jayden for a new one.';
    $('pass').style.display='none'; $('go').style.display='none';
  }
}
async function boot(){
  if(ADMIN) return bootAdmin();
  const token=(new URLSearchParams(location.search).get('c')||'').trim();
  if(token) return bootCreator(token);
  try{const p=sessionStorage.getItem('swipe_pass');if(p){$('pass').value=p;unlock();}}catch(e){}
}
boot();
</script>
